<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ずっちコミュニティ 事前登録</title>

  <!-- ★ ここにSupabaseの設定を入力してください ★ -->
  <script>
    const SUPABASE_URL = 'https://fjjtivzuvvamndftattp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_YNB2Qmzboq7zzeqenI6bmg_PBSN1-Xr';
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 800;
      color: #1a1a2e;
      letter-spacing: -0.5px;
    }

    .logo p {
      color: #6b7280;
      margin-top: 8px;
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #667eea;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    #message {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      display: none;
    }

    #message.success {
      background: #d1fae5;
      color: #065f46;
      display: block;
    }

    #message.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }

    .count {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>ずっちコミュニティ</h1>
      <p>事前登録をして、最新情報をいち早くお届けします。</p>
    </div>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">お名前</label>
        <input type="text" id="name" placeholder="山田 太郎" required>
      </div>
      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" placeholder="taro@example.com" required>
      </div>
      <button type="submit" id="submitBtn">事前登録する</button>
    </form>

    <div id="message"></div>
    <div class="count" id="countArea"></div>
  </div>

  <script>
    const { createClient } = supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 登録済み人数を表示（任意）
    async function loadCount() {
      const { count } = await client
        .from('registrations')
        .select('*', { count: 'exact', head: true });
      if (count !== null) {
        document.getElementById('countArea').textContent = `現在 ${count} 人が登録済み`;
      }
    }
    loadCount();

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('message');
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();

      btn.disabled = true;
      btn.textContent = '送信中...';
      msg.className = '';
      msg.style.display = 'none';

      const { error } = await client
        .from('registrations')
        .insert([{ name, email }]);

      if (error) {
        if (error.code === '23505') {
          msg.textContent = 'このメールアドレスはすでに登録されています。';
        } else {
          msg.textContent = `エラーが発生しました: ${error.message}`;
        }
        msg.className = 'error';
        btn.disabled = false;
        btn.textContent = '事前登録する';
      } else {
        msg.textContent = '登録が完了しました！ご登録ありがとうございます 🎉';
        msg.className = 'success';
        document.getElementById('registerForm').reset();
        loadCount();
        btn.textContent = '登録完了';
      }
    });
  </script>
</body>
</html>
