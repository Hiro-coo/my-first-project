<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ToDoリスト</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0a0a0a;
      color: gold;
      font-family: 'Georgia', serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 60px 16px;
    }

    .container {
      background-color: #111;
      border: 1px solid gold;
      border-radius: 12px;
      padding: 40px 48px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 28px;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    input[type="text"] {
      flex: 1;
      background-color: #1a1a00;
      border: 1px solid gold;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-family: 'Georgia', serif;
      color: gold;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]::placeholder {
      color: #7a6a00;
    }

    input[type="text"]:focus {
      border-color: #ffe066;
    }

    .add-btn {
      background-color: gold;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 1.2rem;
      cursor: pointer;
      color: #0a0a0a;
      transition: background-color 0.2s;
      line-height: 1;
    }

    .add-btn:hover {
      background-color: #ffe066;
    }

    .stats {
      font-size: 0.78rem;
      color: #b8960c;
      text-align: right;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      background-color: #181800;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 14px;
      transition: border-color 0.2s;
      animation: slideIn 0.2s ease;
    }

    li:hover {
      border-color: #555;
    }

    li.done {
      opacity: 0.5;
    }

    li.done .task-text {
      text-decoration: line-through;
      color: #7a6a00;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid gold;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: gold;
      transition: background-color 0.2s;
      padding: 0;
    }

    .check-btn:hover {
      background-color: #2a2a00;
    }

    li.done .check-btn {
      background-color: gold;
      color: #0a0a0a;
    }

    .task-text {
      flex: 1;
      font-size: 0.95rem;
      color: #f0d060;
      word-break: break-word;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: #555;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s;
      line-height: 1;
    }

    .delete-btn:hover {
      color: #cc4444;
    }

    .empty {
      text-align: center;
      color: #444;
      font-size: 0.9rem;
      padding: 24px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ToDoリスト</h1>

    <div class="input-row">
      <input type="text" id="task-input" placeholder="タスクを入力..." />
      <button class="add-btn" onclick="addTask()">＋</button>
    </div>

    <div class="stats" id="stats"></div>
    <ul id="task-list"></ul>
    <p class="empty" id="empty-msg">タスクはありません</p>
  </div>

  <script>
    const input = document.getElementById('task-input');
    const list = document.getElementById('task-list');
    const statsEl = document.getElementById('stats');
    const emptyMsg = document.getElementById('empty-msg');

    let tasks = [];

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    function addTask() {
      const text = input.value.trim();
      if (!text) return;

      tasks.push({ text, done: false });
      input.value = '';
      render();
    }

    function toggleTask(index) {
      tasks[index].done = !tasks[index].done;
      render();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      render();
    }

    function render() {
      list.innerHTML = '';

      tasks.forEach((task, i) => {
        const li = document.createElement('li');
        if (task.done) li.classList.add('done');

        li.innerHTML = `
          <button class="check-btn" onclick="toggleTask(${i})">${task.done ? '✓' : ''}</button>
          <span class="task-text">${escape(task.text)}</span>
          <button class="delete-btn" onclick="deleteTask(${i})">✕</button>
        `;
        list.appendChild(li);
      });

      const done = tasks.filter(t => t.done).length;
      emptyMsg.style.display = tasks.length === 0 ? 'block' : 'none';
      statsEl.textContent = tasks.length > 0
        ? `${done} / ${tasks.length} 完了`
        : '';
    }

    function escape(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    render();
  </script>
</body>
</html>
